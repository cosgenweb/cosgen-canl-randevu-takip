            "Yozgat": ["Merkez", "Sorgun", "Akdağmadeni", "Yerköy", "Boğazlıyan", "Sarıkaya", "Çekerek", "Şefaatli", "Saraykent", "Çayıralan", "Kadışehri", "Aydıncık", "Yenifakılı", "Umurlu"],
            "Zonguldak": ["Merkez", "Ereğli", "Çaycuma", "Devrek", "Kozlu", "Kilimli", "Alaplı", "Gökçebey"],
            "Aksaray": ["Merkez", "Eskil", "Ortaköy", "Gülağaç", "Güzelyurt", "Ağaçören", "Sarıyahşi", "Sultanhanı"],
            "Bayburt": ["Merkez", "Aydıntepe", "Demirözü"],
            "Karaman": ["Merkez", "Ermenek", "Sarıveliler", "Ayrancı", "Kazımkarabekir", "Başyayla"],
            "Kırıkkale": ["Merkez", "Yahşihan", "Keskin", "Delice", "Bahşılı", "Sulakyurt", "Balışeyh", "Karakeçili", "Çelebi"],
            "Batman": ["Merkez", "Kozluk", "Sason", "Beşiri", "Gercüş", "Hasankeyf"],
            "Şırnak": ["Merkez", "Cizre", "Silopi", "İdil", "Uludere", "Beytüşşebap", "Güçlükonak"],
            "Bartın": ["Merkez", "Amasra", "Ulus", "Kurucaşile"],
            "Ardahan": ["Merkez", "Göle", "Çıldır", "Hanak", "Posof", "Damal"],
            "Iğdır": ["Merkez", "Tuzluca", "Aralık", "Karakoyunlu"],
            "Yalova": ["Merkez", "Çınarcık", "Çiftlikköy", "Altınova", "Armutlu", "Termal"],
            "Karabük": ["Merkez", "Safranbolu", "Yenice", "Eskipazar", "Eflani", "Ovacık"],
            "Kilis": ["Merkez", "Musabeyli", "Elbeyli", "Polateli"],
            "Osmaniye": ["Merkez", "Kadirli", "Düziçi", "Bahçe", "Toprakkale", "Sumbas", "Hasanbeyli"],
            "Düzce": ["Merkez", "Akçakoca", "Kaynaşlı", "Gölyaka", "Çilimli", "Gümüşova", "Cumayeri", "Yığılca"]
        };

        const App = () => {
            const ADMIN_PASSWORD = "cosgen45"; 
            const salesReps = ['Temsilci', 'Işıl Engin', 'Hasret Gökot', 'Handan Sevgi', 'Ömür Kaplan', 'Gamze Kaç'];

            const sortedProvNames = useMemo(() => Object.keys(CITY_DISTRICTS).sort((a,b) => a.localeCompare(b,'tr')), []);

            const [appointments, setAppointments] = useState([]);
            const [leads, setLeads] = useState([]);
            const [activeTab, setActiveTab] = useState('saha'); 
            const [loading, setLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [showPassModal, setShowPassModal] = useState(false);
            const [showOutcomeModal, setShowOutcomeModal] = useState(null); 
            const [showReportModal, setShowReportModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [filterCity, setFilterCity] = useState('Hepsi');
            const [searchQuery, setSearchQuery] = useState('');
            const [notification, setNotification] = useState(null);
            const [deletingRecord, setDeletingRecord] = useState(null);

            // Dinamik ilçe takibi için state
            const [selectedSahaCity, setSelectedSahaCity] = useState(sortedProvNames[0]);

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("Giriş hatası:", err));
                const unsubSaha = db.collection('appointments').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'saha' }));
                    data.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
                    setAppointments(data);
                    setLoading(false);
                });
                const unsubLeads = db.collection('leads').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'lead' }));
                    data.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
                    setLeads(data);
                });
                return () => { unsubSaha(); unsubLeads(); };
            }, []);

            const showNotify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passInput === ADMIN_PASSWORD) { setIsAdmin(true); setShowPassModal(false); setPassInput(''); showNotify("Yönetici girişi başarılı."); }
                else showNotify("Hatalı şifre!");
            };

            const addAppointment = async (e) => {
                e.preventDefault();
                const centerName = e.target.centerName.value;
                const phone = e.target.phone.value;
                const city = e.target.city.value;
                const district = e.target.district.value;
                const date = e.target.date.value;
                const time = e.target.time.value;
                const salesRep = e.target.salesRep.value;
                try {
                    await db.collection('appointments').add({ 
                        centerName, phone, city, district, date, time, salesRep, 
                        status: 'Beklemede', 
                        isCalled: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    setShowForm(false);
                    showNotify("Saha ziyareti planlandı.");
                } catch (e) { showNotify("Hata!"); }
            };

            const addLead = async (e) => {
                e.preventDefault();
                const salonName = e.target.salonName.value;
                const phone = e.target.phone.value;
                const city = e.target.city.value;
                const salesRep = e.target.salesRep.value;
                try {
                    await db.collection('leads').add({ salonName, phone, city, salesRep, status: 'Aranacak', note: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowLeadForm(false);
                    showNotify("Talep oluşturuldu.");
                } catch (e) { showNotify("Hata!"); }
            };

            const updateStatus = async (id, status, type, extraData = {}) => {
                const collectionName = type === 'saha' ? 'appointments' : 'leads';
                try { 
                    await db.collection(collectionName).doc(id).update({ status, ...extraData }); 
                    showNotify(`Güncellendi`); 
                    if (showOutcomeModal) setShowOutcomeModal(null);
                } catch (e) { showNotify("Hata!"); }
            };

            const markAsCalled = async (id, type) => {
                const collectionName = type === 'saha' ? 'appointments' : 'leads';
                try {
                    await db.collection(collectionName).doc(id).update({ isCalled: true });
                    showNotify("Arandı olarak işaretlendi");
                } catch (e) { showNotify("Hata!"); }
            };

            const deleteAnyRecord = async () => {
                const collectionName = deletingRecord.type === 'saha' ? 'appointments' : 'leads';
                try { await db.collection(collectionName).doc(deletingRecord.id).delete(); setDeletingRecord(null); showNotify("Silindi."); }
                catch (e) { showNotify("Hata!"); }
            };

            const weeklyReport = useMemo(() => {
                const today = new Date();
                const currentDay = today.getDay();
                const diff = today.getDate() - currentDay + (currentDay === 0 ? -6 : 1);
                const startOfWeek = new Date(today.setDate(diff));
                startOfWeek.setHours(0,0,0,0);

                return salesReps.map(rep => {
                    const repSaha = appointments.filter(a => a.salesRep === rep && new Date(a.date) >= startOfWeek);
                    const repLeads = leads.filter(l => l.salesRep === rep && (l.createdAt?.toDate() || 0) >= startOfWeek);
                    return {
                        name: rep,
                        sahaCount: repSaha.length,
                        sahaDone: repSaha.filter(a => a.status === 'Tamamlandı').length,
                        sahaCalled: repSaha.filter(a => a.isCalled).length,
                        leadRandevu: repLeads.filter(l => l.note === 'Randevu Alındı').length,
                        leadRed: repLeads.filter(l => l.note === 'Reddetti').length
                    };
                });
            }, [appointments, leads]);

            const filteredSaha = appointments.filter(a => (filterCity === 'Hepsi' || a.city === filterCity) && (a.centerName || "").toLowerCase().includes(searchQuery.toLowerCase()));
            const filteredLeads = leads.filter(l => (filterCity === 'Hepsi' || l.city === filterCity) && ((l.salonName || "").toLowerCase().includes(searchQuery.toLowerCase()) || (l.salesRep || "").toLowerCase().includes(searchQuery.toLowerCase())));

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black uppercase tracking-[0.3em] text-xs">Cosgen Medical...</div>;

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <nav className="glass-header sticky top-0 z-40 px-4 py-4 md:px-8 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <CosgenLogo />
                            <div className="flex gap-2">
                                {isAdmin && (
                                    <button onClick={() => setShowReportModal(true)} className="bg-indigo-50 text-indigo-600 px-4 py-2.5 rounded-xl font-bold text-[11px] uppercase tracking-wider active:scale-95 transition-all flex items-center gap-2 border border-indigo-100">
                                        <Icons.BarChart size={16}/> Raporlar
                                    </button>
                                )}
                                <button onClick={() => isAdmin ? (activeTab === 'saha' ? setShowForm(true) : setShowLeadForm(true)) : setShowPassModal(true)} 
                                        className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-[11px] uppercase tracking-wider active:scale-95 transition-all shadow-lg flex items-center gap-2">
                                    {isAdmin ? <><Icons.Plus size={16}/> {activeTab === 'saha' ? 'Yeni Saha' : 'Yeni Talep'}</> : <><Icons.Lock size={14}/> Yönetici</>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 md:px-8 mt-6">
                        <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-8 w-full md:w-fit">
                            <button onClick={() => setActiveTab('saha')} className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-extrabold uppercase text-[10px] tracking-widest transition-all ${activeTab === 'saha' ? 'tab-btn-active' : 'text-slate-500'}`}>Saha ({appointments.length})</button>
                            <button onClick={() => setActiveTab('sosyal')} className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-extrabold uppercase text-[10px] tracking-widest transition-all ${activeTab === 'sosyal' ? 'tab-btn-active' : 'text-slate-500'}`}>Sosyal ({leads.length})</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="md:col-span-2 relative">
                                <Icons.Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input type="text" placeholder="Merkez, salon veya isim ara..." className="w-full pl-12 pr-4 py-4 bg-white card-shadow rounded-2xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                            </div>
                            <div className="relative">
                                <select className="w-full p-4 bg-white card-shadow rounded-2xl font-bold text-xs uppercase cursor-pointer appearance-none outline-none border-none pr-10" value={filterCity} onChange={e => setFilterCity(e.target.value)}>
                                    <option value="Hepsi">Tüm Şehirler</option>
                                    {sortedProvNames.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="space-y-4">
                            {/* Saha Listesi */}
                            {activeTab === 'saha' && filteredSaha.map(app => (
                                <div key={app.id} className="bg-white card-shadow rounded-[1.5rem] border-l-[6px] border-slate-900 flex flex-col p-6 gap-6 animate-fade-in relative overflow-hidden">
                                    <div className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border ${app.status === 'Beklemede' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{app.status}</span>
                                                {app.isCalled && <span className="text-[9px] font-black uppercase px-2.5 py-1 rounded-lg bg-indigo-50 text-indigo-600 border border-indigo-100">📞 Arandı</span>}
                                                {isAdmin && <button onClick={() => setDeletingRecord(app)} className="text-slate-300 hover:text-rose-500"><Icons.Trash2 size={16}/></button>}
                                            </div>
                                            <h4 className="text-xl font-extrabold text-slate-900 uppercase mb-2 leading-none">{app.centerName}</h4>
                                            <div className="flex flex-wrap items-center gap-3">
                                                <div className="text-slate-500 font-bold text-[11px] uppercase flex items-center gap-1.5"><Icons.MapPin size={14}/> {app.district} / {app.city}</div>
                                                {app.phone && <div className="text-indigo-600 font-bold text-[11px] uppercase flex items-center gap-1.5"><Icons.Phone size={14}/> {app.phone}</div>}
                                            </div>
                                        </div>
                                        <div className="flex flex-col md:items-end gap-1">
                                            <div className="text-xs font-black text-slate-400 uppercase tracking-widest">{app.date} | {app.time}</div>
                                            <div className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{app.salesRep}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-2 border-t pt-6 border-slate-50">
                                        <a 
                                            href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(app.centerName + ' ' + app.district + ' ' + app.city)}`}
                                            target="_blank"
                                            className="flex items-center justify-center gap-2 bg-slate-100 text-slate-700 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all"
                                        >
                                            <Icons.ExternalLink size={16}/> Konumu Aç
                                        </a>
                                        {app.phone ? (
                                            <a 
                                                href={`tel:${app.phone}`} 
                                                onClick={() => markAsCalled(app.id, 'saha')}
                                                className="flex items-center justify-center gap-2 bg-emerald-500 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100"
                                            >
                                                <Icons.Phone size={16}/> Hemen Ara
                                            </a>
                                        ) : (
                                            <div className="flex items-center justify-center gap-2 bg-slate-50 text-slate-400 py-3 rounded-xl font-black text-[10px] uppercase border border-dashed border-slate-200">No Yok</div>
                                        )}
                                        {app.status === 'Beklemede' ? (
                                            <button onClick={() => updateStatus(app.id, 'Tamamlandı', 'saha')} className="bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg">Ziyareti Bitir</button>
                                        ) : (
                                            <div className="flex items-center justify-center gap-2 text-emerald-600 font-black text-[10px] uppercase py-3 bg-emerald-50/50 rounded-xl"><Icons.CheckCircle size={18}/> Tamamlandı</div>
                                        )}
                                    </div>
                                </div>
                            ))}

                            {/* Sosyal Medya Listesi (Lead) */}
                            {activeTab === 'sosyal' && filteredLeads.map(lead => (
                                <div key={lead.id} className="bg-white card-shadow rounded-[1.5rem] border-l-[6px] border-indigo-600 flex flex-col p-6 gap-6 animate-fade-in relative">
                                    <div className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border ${lead.status === 'Aranacak' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{lead.status}</span>
                                                <Icons.Instagram size={12} className="text-pink-500" />
                                                {isAdmin && <button onClick={() => setDeletingRecord(lead)} className="text-slate-300 hover:text-rose-500 transition-colors ml-2"><Icons.Trash2 size={16}/></button>}
                                            </div>
                                            <h4 className="text-xl font-extrabold text-slate-900 uppercase mb-2 leading-none">{lead.salonName}</h4>
                                            <div className="flex gap-4">
                                                <div className="text-slate-500 font-bold text-[11px] uppercase bg-slate-50 px-2 py-1 rounded">{lead.city}</div>
                                                <div className="text-indigo-600 font-bold text-[11px] uppercase bg-indigo-50 px-2 py-1 rounded">{lead.phone}</div>
                                            </div>
                                            {lead.note && <div className="mt-4 p-4 rounded-2xl border-2 bg-slate-50 border-slate-100 text-xs font-bold text-slate-700 uppercase tracking-tight">{lead.note}</div>}
                                        </div>
                                        <div className="text-indigo-700 font-bold text-sm bg-indigo-50 px-3 py-1 rounded-lg w-fit h-fit">{lead.salesRep}</div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mt-2 border-t pt-6 border-slate-50">
                                        <a href={`tel:${lead.phone}`} onClick={() => markAsCalled(lead.id, 'lead')} className="flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-lg">
                                            <Icons.Phone size={18}/> Hemen Ara
                                        </a>
                                        <button onClick={() => setShowOutcomeModal(lead)} className="bg-slate-900 text-white py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-lg">
                                            Sonuç Gir
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Report Modal */}
                    {showReportModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-4 z-[120] animate-fade-in print-container">
                            <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col print-content">
                                <div className="p-8 bg-slate-900 text-white flex justify-between items-center no-print">
                                    <h2 className="text-2xl font-black uppercase tracking-tighter">Haftalık Rapor</h2>
                                    <button onClick={() => setShowReportModal(false)} className="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/10 hover:bg-white/20"><Icons.X size={24} /></button>
                                </div>
                                <div id="printable-report" className="p-8 overflow-y-auto no-scrollbar space-y-8 print-content">
                                    <div className="hidden print:block text-3xl font-black mb-8 border-b-4 border-slate-900 pb-4 uppercase tracking-tighter text-center">COSGEN MEDICAL HAFTALIK PERFORMANS</div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {[
                                            { label: "Toplam Saha", val: weeklyReport.reduce((a, c) => a + c.sahaCount, 0), color: "bg-slate-100" },
                                            { label: "Saha Aramaları", val: weeklyReport.reduce((a, c) => a + c.sahaCalled, 0), color: "bg-indigo-50 text-indigo-600" },
                                            { label: "Biten Saha", val: weeklyReport.reduce((a, c) => a + c.sahaDone, 0), color: "bg-emerald-50 text-emerald-600" },
                                            { label: "Yeni Randevu", val: weeklyReport.reduce((a, c) => a + c.leadRandevu, 0), color: "bg-teal-50 text-teal-600" }
                                        ].map((s, i) => (
                                            <div key={i} className={`${s.color} p-5 rounded-3xl text-center border border-black/5`}>
                                                <p className="text-[9px] font-black uppercase tracking-widest mb-1 opacity-70">{s.label}</p>
                                                <p className="text-2xl font-black">{s.val}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 rounded-3xl overflow-hidden border border-slate-100">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-100/50">
                                                    <th className="p-4 text-[10px] font-black uppercase text-slate-400">Temsilci</th>
                                                    <th className="p-4 text-center text-[10px] font-black uppercase">Saha Plan</th>
                                                    <th className="p-4 text-center text-[10px] font-black uppercase">Saha Aranan</th>
                                                    <th className="p-4 text-center text-[10px] font-black uppercase text-emerald-600">Biten</th>
                                                    <th className="p-4 text-center text-[10px] font-black uppercase text-indigo-600">Randevu</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {weeklyReport.map((rep, i) => (
                                                    <tr key={i} className="border-t border-slate-200/50 hover:bg-white transition-colors">
                                                        <td className="p-4 font-extrabold text-sm">{rep.name}</td>
                                                        <td className="p-4 text-center font-bold text-slate-500">{rep.sahaCount}</td>
                                                        <td className="p-4 text-center font-bold text-indigo-500">{rep.sahaCalled}</td>
                                                        <td className="p-4 text-center font-bold text-emerald-600">{rep.sahaDone}</td>
                                                        <td className="p-4 text-center font-bold text-indigo-600">{rep.leadRandevu}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end gap-4 no-print">
                                    <button onClick={() => window.print()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl">Yazdır / PDF Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Outcome Modal */}
                    {showOutcomeModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-4 z-[110] animate-fade-in">
                            <div className="bg-white p-8 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-2xl font-black mb-1 uppercase tracking-tighter text-slate-900">Sonuç Seçin</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-8 leading-tight">{showOutcomeModal.salonName}</p>
                                <div className="space-y-3">
                                    {[
                                        { label: "Randevu Alındı", color: "bg-emerald-500" },
                                        { label: "Tekrar Aranacak", color: "bg-amber-500" },
                                        { label: "Reddetti", color: "bg-rose-500" },
                                        { label: "Ulaşılamadı", color: "bg-slate-400" }
                                    ].map((opt, i) => (
                                        <button key={i} onClick={() => updateStatus(showOutcomeModal.id, 'Arandı', 'lead', { note: opt.label })} className="w-full p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl flex items-center gap-4 transition-all">
                                            <div className={`w-3 h-3 rounded-full ${opt.color}`}></div>
                                            <span className="font-extrabold text-sm uppercase text-slate-700">{opt.label}</span>
                                        </button>
                                    ))}
                                    <button onClick={() => setShowOutcomeModal(null)} className="w-full py-4 text-xs font-black text-slate-400 uppercase mt-4">Vazgeç</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Pass Modal */}
                    {showPassModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-10 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl">
                                <Icons.Lock size={32} className="mx-auto mb-6 text-slate-900" />
                                <h3 className="text-2xl font-black mb-8 uppercase tracking-tighter text-slate-900">Sistem Girişi</h3>
                                <form onSubmit={handlePasswordSubmit}>
                                    <input type="password" autoFocus className="w-full p-5 bg-slate-50 rounded-[1.5rem] mb-6 text-center font-black text-3xl outline-none" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="••••" />
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black uppercase text-xs">Giriş</button>
                                </form>
                                <button onClick={() => setShowPassModal(false)} className="mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Geri Dön</button>
                            </div>
                        </div>
                    )}

                    {/* Form Modals (Saha ve Lead) */}
                    {(showForm || showLeadForm) && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-lg flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white rounded-[3rem] w-full max-w-xl shadow-2xl overflow-hidden max-h-[92vh] overflow-y-auto no-scrollbar animate-fade-in border border-white/20">
                                <div className={`p-8 ${activeTab === 'saha' ? 'bg-slate-900' : 'bg-indigo-600'} text-white flex justify-between items-center sticky top-0 z-10`}>
                                    <h2 className="text-2xl font-black uppercase tracking-tighter flex items-center gap-3">
                                        {activeTab === 'saha' ? <><Icons.MapPin size={28}/> Yeni Saha Kaydı</> : <><Icons.Instagram size={28}/> Yeni Sosyal Talep</>}
                                    </h2>
                                    <button onClick={() => activeTab === 'saha' ? setShowForm(false) : setShowLeadForm(false)} className="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/20 hover:bg-white/40 transition-all"><Icons.X size={24} /></button>
                                </div>
                                <form onSubmit={activeTab === 'saha' ? addAppointment : addLead} className="p-8 md:p-10 space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">{activeTab === 'saha' ? 'Güzellik Merkezi İsmi' : 'Salon Adı'}</label>
                                        <input name={activeTab === 'saha' ? "centerName" : "salonName"} required className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-bold outline-none transition-all" placeholder="Merkez / Salon Adı" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Telefon Numarası</label>
                                        <input name="phone" type="tel" required className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-bold outline-none transition-all" placeholder="05XX XXX XX XX" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Şehir</label>
                                            <select 
                                                name="city" 
                                                value={selectedSahaCity}
                                                className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none"
                                                onChange={(e) => setSelectedSahaCity(e.target.value)}
                                            >
                                                {sortedProvNames.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        {activeTab === 'saha' ? (
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">İlçe</label>
                                                <select name="district" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                    {(CITY_DISTRICTS[selectedSahaCity] || ["Merkez"]).map(d => <option key={d} value={d}>{d}</option>)}
                                                </select>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Satış Temsilcisi</label>
                                                <select name="salesRep" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                    {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                    {activeTab === 'saha' && (
                                        <>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Ziyaret Edecek Temsilci</label>
                                            <select name="salesRep" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Ziyaret Tarihi</label>
                                                <input name="date" type="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Saat</label>
                                                <input name="time" type="time" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                            </div>
                                        </div>
                                        </>
                                    )}
                                    <button type="submit" className={`w-full ${activeTab === 'saha' ? 'bg-slate-900' : 'bg-indigo-600'} text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl hover:shadow-2xl transition-all active:scale-[0.98] mt-4`}>
                                        Sisteme Kaydet
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Silme Onayı */}
                    {deletingRecord && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-4 z-[200] animate-fade-in">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-6"><Icons.Trash2 size={32}/></div>
                                <h3 className="text-2xl font-black mb-2 uppercase tracking-tighter text-slate-900">Emin misiniz?</h3>
                                <p className="text-slate-500 font-bold text-[11px] mb-8 leading-relaxed uppercase tracking-wider">Bu kayıt kalıcı olarak silinecektir.</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setDeletingRecord(null)} className="flex-1 font-black text-slate-400 uppercase text-[10px] tracking-widest py-4 border-2 border-slate-100 rounded-2xl">Vazgeç</button>
                                    <button onClick={deleteAnyRecord} className="flex-[2] bg-rose-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl shadow-rose-200">Evet, Sil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notification */}
                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] text-[11px] font-black uppercase z-[250] shadow-2xl flex items-center gap-4 animate-fade-in border border-white/10">
                            <div className="w-2.5 h-2.5 bg-indigo-400 rounded-full animate-pulse shadow-glow"></div>
                            {notification}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
