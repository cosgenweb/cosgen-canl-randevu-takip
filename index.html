<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosgen Medical | Saha & Sosyal Medya Takip</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f1f5f9; 
            margin: 0;
            color: #1e293b;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tab-btn-active {
            background-color: #0f172a;
            color: white;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        .card-shadow {
            box-shadow: 0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- İkon Bileşenleri ---
        const Icon = ({ d, size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={d} />
            </svg>
        );

        const Icons = {
            Calendar: (p) => <Icon {...p} d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z M16 2v4 M8 2v4 M3 10h18" />,
            MapPin: (p) => <Icon {...p} d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z M12 10 a3 3 0 1 0 0-6 3 3 0 0 0 0 6" />,
            User: (p) => <Icon {...p} d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8" />,
            CheckCircle: (p) => <Icon {...p} d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01 9 11.01" />,
            Clock: (p) => <Icon {...p} d="M12 12m-10 0a10 10 0 1 0 20 0a10 10 0 1 0-20 0 M12 6v6l4 2" />,
            Plus: (p) => <Icon {...p} d="M12 5v14 M5 12h14" />,
            Search: (p) => <Icon {...p} d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.35-4.35" />,
            Trash2: (p) => <Icon {...p} d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
            Lock: (p) => <Icon {...p} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z M7 11V7a5 5 0 0 1 10 0v4" />,
            X: (p) => <Icon {...p} d="M18 6L6 18M6 6l12 12" />,
            Phone: (p) => <Icon {...p} d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
            Instagram: (p) => <Icon {...p} d="M17 2H7a5 5 0 0 0-5 5v10a5 5 0 0 0 5 5h10a5 5 0 0 0 5-5V7a5 5 0 0 0-5-5z M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z M17.5 6.5h.01" />,
            MessageSquare: (p) => <Icon {...p} d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        };

        const CosgenLogo = () => (
            <div className="font-extrabold text-2xl tracking-tighter text-slate-900 flex items-center">
                <div className="bg-slate-900 text-white w-8 h-8 rounded-lg flex items-center justify-center mr-2 text-sm italic">C</div>
                cos<span className="text-indigo-600">gen</span>
            </div>
        );

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCzRjEc2aud5MFccPmgzjpeHezrhTfz1Pk",
            authDomain: "cosgenv2.firebaseapp.com",
            projectId: "cosgenv2",
            storageBucket: "cosgenv2.firebasestorage.app",
            messagingSenderId: "547874140972",
            appId: "1:547874140972:web:70019681e4f66d2a5bb289",
            measurementId: "G-QQTWEW2ZD3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const CITY_DISTRICTS = {
            "Adana": ["Seyhan", "Çukurova", "Sarıçam", "Yüreğir"], "Adıyaman": ["Merkez"], "Afyonkarahisar": ["Merkez"], "Ağrı": ["Merkez"], "Amasya": ["Merkez"], "Ankara": ["Çankaya", "Keçiören", "Yenimahalle", "Mamak", "Etimesgut", "Sincan"], "Antalya": ["Muratpaşa", "Kepez", "Konyaaltı", "Alanya"], "Artvin": ["Merkez"], "Aydın": ["Efeler", "Nazilli", "Kuşadası"], "Balıkesir": ["Karesi", "Altıeylül", "Bandırma"], "Bilecik": ["Merkez"], "Bingöl": ["Merkez"], "Bitlis": ["Merkez"], "Bolu": ["Merkez"], "Burdur": ["Merkez"], "Bursa": ["Nilüfer", "Osmangazi", "Yıldırım", "İnegöl"], "Çanakkale": ["Merkez"], "Çankırı": ["Merkez"], "Çorum": ["Merkez"], "Denizli": ["Pamukkale", "Merkezefendi"], "Diyarbakır": ["Kayapınar", "Bağlar"], "Edirne": ["Merkez"], "Elazığ": ["Merkez"], "Erzincan": ["Merkez"], "Erzurum": ["Yakutiye"], "Eskişehir": ["Odunpazarı", "Tepebaşı"], "Gaziantep": ["Şahinbey", "Şehitkamil"], "Giresun": ["Merkez"], "Gümüşhane": ["Merkez"], "Hakkari": ["Merkez"], "Hatay": ["Antakya", "İskenderun"], "Isparta": ["Merkez"], "Mersin": ["Yenişehir", "Mezitli", "Tarsus"], "İstanbul": ["Beşiktaş", "Kadıköy", "Şişli", "Üsküdar", "Bakırköy", "Ataşehir", "Sarıyer"], "İzmir": ["Konak", "Karşıyaka", "Bornova", "Buca", "Bayraklı", "Çiğli"], "Kars": ["Merkez"], "Kastamonu": ["Merkez"], "Kayseri": ["Melikgazi", "Kocasinan"], "Kırklareli": ["Merkez"], "Kırşehir": ["Merkez"], "Kocaeli": ["İzmit", "Gebze"], "Konya": ["Selçuklu", "Meram"], "Kütahya": ["Merkez"], "Malatya": ["Yeşilyurt"], "Manisa": ["Yunusemre", "Şehzadeler"], "Kahramanmaraş": ["Onikişubat"], "Mardin": ["Artuklu"], "Muğla": ["Bodrum", "Fethiye", "Marmaris"], "Muş": ["Merkez"], "Nevşehir": ["Merkez"], "Niğde": ["Merkez"], "Ordu": ["Altınordu"], "Rize": ["Merkez"], "Sakarya": ["Adapazarı", "Serdivan"], "Samsun": ["Atakum", "İlkadım"], "Siirt": ["Merkez"], "Sinop": ["Merkez"], "Sivas": ["Merkez"], "Tekirdağ": ["Süleymanpaşa", "Çorlu"], "Tokat": ["Merkez"], "Trabzon": ["Ortahisar"], "Tunceli": ["Merkez"], "Şanlıurfa": ["Haliliye", "Eyyübiye"], "Uşak": ["Merkez"], "Van": ["İpekyolu"], "Yozgat": ["Merkez"], "Zonguldak": ["Merkez"], "Aksaray": ["Merkez"], "Bayburt": ["Merkez"], "Karaman": ["Merkez"], "Kırıkkale": ["Merkez"], "Batman": ["Merkez"], "Şırnak": ["Merkez"], "Bartın": ["Merkez"], "Ardahan": ["Merkez"], "Iğdır": ["Merkez"], "Yalova": ["Merkez"], "Karabük": ["Merkez"], "Kilis": ["Merkez"], "Osmaniye": ["Merkez"], "Düzce": ["Merkez"]
        };

        const App = () => {
            const ADMIN_PASSWORD = "cosgen45"; 
            const salesReps = ['Işıl Engin', 'Hasret Gökot', 'Handan Sevgi', 'Ömür Kaplan', 'Gamze Kaç'];

            const [appointments, setAppointments] = useState([]);
            const [leads, setLeads] = useState([]);
            const [activeTab, setActiveTab] = useState('saha'); 
            const [loading, setLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [showPassModal, setShowPassModal] = useState(false);
            const [showOutcomeModal, setShowOutcomeModal] = useState(null); 
            const [passInput, setPassInput] = useState('');
            const [filterCity, setFilterCity] = useState('Hepsi');
            const [searchQuery, setSearchQuery] = useState('');
            const [notification, setNotification] = useState(null);
            const [deletingRecord, setDeletingRecord] = useState(null);

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("Giriş hatası:", err));
                const unsubSaha = db.collection('appointments').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'saha' }));
                    data.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
                    setAppointments(data);
                    setLoading(false);
                });
                const unsubLeads = db.collection('leads').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'lead' }));
                    data.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
                    setLeads(data);
                });
                return () => { unsubSaha(); unsubLeads(); };
            }, []);

            const showNotify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passInput === ADMIN_PASSWORD) { setIsAdmin(true); setShowPassModal(false); setPassInput(''); showNotify("Yönetici girişi başarılı."); }
                else showNotify("Hatalı şifre!");
            };

            const addAppointment = async (e) => {
                e.preventDefault();
                const centerName = e.target.centerName.value;
                const city = e.target.city.value;
                const district = e.target.district.value;
                const date = e.target.date.value;
                const time = e.target.time.value;
                const salesRep = e.target.salesRep.value;
                try {
                    await db.collection('appointments').add({ centerName, city, district, date, time, salesRep, status: 'Beklemede', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowForm(false);
                    showNotify("Ziyaret kaydedildi.");
                } catch (e) { showNotify("Hata!"); }
            };

            const addLead = async (e) => {
                e.preventDefault();
                const salonName = e.target.salonName.value;
                const phone = e.target.phone.value;
                const city = e.target.city.value;
                const salesRep = e.target.salesRep.value;
                try {
                    await db.collection('leads').add({ salonName, phone, city, salesRep, status: 'Aranacak', note: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowLeadForm(false);
                    showNotify("Talep oluşturuldu.");
                } catch (e) { showNotify("Hata!"); }
            };

            const updateStatus = async (id, status, type, note = '') => {
                const collectionName = type === 'saha' ? 'appointments' : 'leads';
                const updateData = { status };
                if (note) updateData.note = note;
                try { 
                    await db.collection(collectionName).doc(id).update(updateData); 
                    showNotify(`Güncellendi`); 
                    if (showOutcomeModal) setShowOutcomeModal(null);
                } catch (e) { showNotify("Hata!"); }
            };

            const deleteAnyRecord = async () => {
                const collectionName = deletingRecord.type === 'saha' ? 'appointments' : 'leads';
                try { await db.collection(collectionName).doc(deletingRecord.id).delete(); setDeletingRecord(null); showNotify("Silindi."); }
                catch (e) { showNotify("Hata!"); }
            };

            const filteredSaha = appointments.filter(a => (filterCity === 'Hepsi' || a.city === filterCity) && (a.centerName || "").toLowerCase().includes(searchQuery.toLowerCase()));
            const filteredLeads = leads.filter(l => (filterCity === 'Hepsi' || l.city === filterCity) && ((l.salonName || "").toLowerCase().includes(searchQuery.toLowerCase()) || (l.salesRep || "").toLowerCase().includes(searchQuery.toLowerCase())));

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black uppercase tracking-[0.3em] text-xs">Cosgen Medical...</div>;

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <nav className="glass-header sticky top-0 z-40 px-4 py-4 md:px-8 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <CosgenLogo />
                            <button onClick={() => isAdmin ? (activeTab === 'saha' ? setShowForm(true) : setShowLeadForm(true)) : setShowPassModal(true)} 
                                    className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-[11px] uppercase tracking-wider active:scale-95 transition-all shadow-lg flex items-center gap-2">
                                {isAdmin ? <><Icons.Plus size={16}/> {activeTab === 'saha' ? 'Yeni Saha' : 'Yeni Talep'}</> : <><Icons.Lock size={14}/> Yönetici</>}
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 md:px-8 mt-6">
                        {/* Tabs Navigation */}
                        <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-8 w-full md:w-fit">
                            <button onClick={() => setActiveTab('saha')} className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-extrabold uppercase text-[10px] tracking-widest transition-all ${activeTab === 'saha' ? 'tab-btn-active' : 'text-slate-500'}`}>
                                Saha ({appointments.length})
                            </button>
                            <button onClick={() => setActiveTab('sosyal')} className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-extrabold uppercase text-[10px] tracking-widest transition-all ${activeTab === 'sosyal' ? 'tab-btn-active' : 'text-slate-500'}`}>
                                Sosyal ({leads.length})
                            </button>
                        </div>

                        {/* Search & Filter Bar */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="md:col-span-2 relative">
                                <Icons.Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input type="text" placeholder="Merkez, salon veya isim ara..." className="w-full pl-12 pr-4 py-4 bg-white card-shadow rounded-2xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                            </div>
                            <div className="relative">
                                <select className="w-full p-4 bg-white card-shadow rounded-2xl font-bold text-xs uppercase cursor-pointer appearance-none outline-none border-none pr-10" value={filterCity} onChange={e => setFilterCity(e.target.value)}>
                                    <option value="Hepsi">Tüm Şehirler</option>
                                    {Object.keys(CITY_DISTRICTS).sort((a,b)=>a.localeCompare(b,'tr')).map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                    <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" /></svg>
                                </div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="space-y-4">
                            {/* Saha Listesi */}
                            {activeTab === 'saha' && filteredSaha.map(app => (
                                <div key={app.id} className="bg-white card-shadow rounded-[1.5rem] border-l-[6px] border-slate-900 overflow-hidden animate-fade-in flex flex-col md:flex-row justify-between md:items-center p-6 gap-6">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-3">
                                            <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border ${app.status === 'Beklemede' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{app.status}</span>
                                            {isAdmin && <button onClick={() => setDeletingRecord(app)} className="text-slate-300 hover:text-rose-500 transition-colors"><Icons.Trash2 size={16}/></button>}
                                        </div>
                                        <h4 className="text-xl font-extrabold text-slate-900 leading-tight mb-2 uppercase">{app.centerName}</h4>
                                        <div className="flex items-center gap-1.5 text-slate-500 font-bold text-[11px] uppercase tracking-wide">
                                            <Icons.MapPin size={14}/> {app.district} / {app.city}
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-6 md:border-l md:pl-8 border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-slate-50 p-2 rounded-xl text-slate-400"><Icons.Calendar size={18}/></div>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Vakit</p>
                                                <span className="text-sm font-bold text-slate-700">{app.date} | {app.time}</span>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="bg-slate-50 p-2 rounded-xl text-slate-400"><Icons.User size={18}/></div>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Temsilci</p>
                                                <span className="text-sm font-bold text-slate-700">{app.salesRep}</span>
                                            </div>
                                        </div>
                                        <div className="w-full md:w-auto">
                                            {app.status === 'Beklemede' ? 
                                                <button onClick={() => updateStatus(app.id, 'Tamamlandı', 'saha')} className="w-full bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-slate-100 hover:shadow-xl transition-all">Tamamla</button> : 
                                                <div className="flex items-center justify-center gap-2 text-emerald-600 font-black text-[11px] uppercase py-3 bg-emerald-50/50 rounded-xl px-4"><Icons.CheckCircle size={18}/> İşlem Bitti</div>
                                            }
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {/* Sosyal Medya Listesi */}
                            {activeTab === 'sosyal' && filteredLeads.map(lead => (
                                <div key={lead.id} className="bg-white card-shadow rounded-[1.5rem] border-l-[6px] border-indigo-600 overflow-hidden animate-fade-in flex flex-col md:flex-row justify-between md:items-center p-6 gap-6">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-3">
                                            <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border ${lead.status === 'Aranacak' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{lead.status}</span>
                                            <div className="bg-gradient-to-tr from-purple-500 to-pink-500 p-1.5 rounded-lg text-white"><Icons.Instagram size={12}/></div>
                                            {isAdmin && <button onClick={() => setDeletingRecord(lead)} className="text-slate-300 hover:text-rose-500 transition-colors"><Icons.Trash2 size={16}/></button>}
                                        </div>
                                        <h4 className="text-xl font-extrabold text-slate-900 leading-tight mb-2 uppercase">{lead.salonName}</h4>
                                        <div className="flex flex-wrap items-center gap-4">
                                            <div className="text-slate-500 font-bold text-[11px] uppercase flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md"><Icons.MapPin size={12}/> {lead.city}</div>
                                            <div className="text-indigo-600 font-bold text-[11px] uppercase flex items-center gap-1.5 bg-indigo-50 px-2 py-1 rounded-md tracking-wider"><Icons.Phone size={12}/> {lead.phone}</div>
                                        </div>
                                        {lead.note && (
                                            <div className={`mt-4 p-4 rounded-2xl border-2 flex items-start gap-3 ${
                                                lead.note === 'Randevu Alındı' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
                                                lead.note === 'Reddetti' ? 'bg-rose-50 border-rose-100 text-rose-800' :
                                                lead.note === 'Tekrar Aranacak' ? 'bg-amber-50 border-amber-100 text-amber-800' :
                                                'bg-slate-50 border-slate-100 text-slate-700'
                                            }`}>
                                                <Icons.MessageSquare size={16} className="mt-0.5 opacity-60"/>
                                                <div>
                                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1">Görüşme Notu</p>
                                                    <p className="text-xs font-bold leading-tight">{lead.note}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex flex-wrap items-center gap-4 md:border-l md:pl-8 border-slate-100">
                                        <div className="min-w-[120px]">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1.5">Sorumlu Satışçı</p>
                                            <div className="text-indigo-700 font-bold text-sm bg-indigo-50 inline-block px-3 py-1 rounded-lg">{lead.salesRep}</div>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-2 w-full lg:w-auto">
                                            {lead.status === 'Aranacak' ? (
                                                <>
                                                    <a href={`tel:${lead.phone}`} className="flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-[0.1em] shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                                                        <Icons.Phone size={18}/> HEMEN ARA
                                                    </a>
                                                    <button onClick={() => setShowOutcomeModal(lead)} className="bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-slate-100 active:scale-95 transition-all">
                                                        Sonuç Gir
                                                    </button>
                                                </>
                                            ) : (
                                                <button onClick={() => setShowOutcomeModal(lead)} className="bg-white text-slate-600 border-2 border-slate-100 px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-slate-50 transition-all">
                                                    <Icons.MessageSquare size={16}/> Notu Güncelle
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Boş Liste Durumu */}
                        {((activeTab === 'saha' && filteredSaha.length === 0) || (activeTab === 'sosyal' && filteredLeads.length === 0)) && (
                            <div className="py-24 text-center bg-white rounded-[3rem] border-4 border-dashed border-slate-200 card-shadow">
                                <Icons.Search size={50} className="mx-auto text-slate-200 mb-4 animate-bounce"/>
                                <p className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Aradığınız kriterde kayıt yok</p>
                            </div>
                        )}
                    </div>

                    {/* Outcome Modal (Hızlı Seçim) */}
                    {showOutcomeModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-4 z-[110] animate-fade-in">
                            <div className="bg-white p-8 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <div className="p-3 bg-indigo-50 text-indigo-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"><Icons.MessageSquare size={28}/></div>
                                <h3 className="text-2xl font-black mb-1 uppercase tracking-tighter text-slate-900">Sonuç Nedir?</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8 leading-tight">{showOutcomeModal.salonName}</p>
                                <div className="space-y-3">
                                    {[
                                        { label: "Randevu Alındı", color: "bg-emerald-500", text: "text-emerald-700" },
                                        { label: "Tekrar Aranacak", color: "bg-amber-500", text: "text-amber-700" },
                                        { label: "Reddetti", color: "bg-rose-500", text: "text-rose-700" },
                                        { label: "Ulaşılamadı", color: "bg-slate-400", text: "text-slate-600" }
                                    ].map((opt, idx) => (
                                        <button key={idx} onClick={() => updateStatus(showOutcomeModal.id, 'Arandı', 'lead', opt.label)} className="w-full p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl flex items-center gap-4 transition-all group border-2 border-transparent hover:border-slate-200">
                                            <div className={`w-3 h-3 rounded-full ${opt.color} shadow-sm group-hover:scale-125 transition-transform`}></div>
                                            <span className="font-extrabold text-sm uppercase text-slate-700 tracking-tight">{opt.label}</span>
                                        </button>
                                    ))}
                                    <button onClick={() => setShowOutcomeModal(null)} className="w-full py-4 text-xs font-black text-slate-400 uppercase tracking-widest mt-4">Vazgeç</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Pass Modal */}
                    {showPassModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-10 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl">
                                <div className="bg-slate-900 text-white w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-slate-200"><Icons.Lock size={32} /></div>
                                <h3 className="text-2xl font-black mb-1 uppercase tracking-tighter text-slate-900">Sistem Kilidi</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8">Devam etmek için şifreyi giriniz</p>
                                <form onSubmit={handlePasswordSubmit}>
                                    <input type="password" autoFocus className="w-full p-5 bg-slate-50 rounded-[1.5rem] mb-6 text-center font-black text-3xl outline-none border-4 border-transparent focus:border-indigo-100 transition-all text-slate-900" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="••••" />
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-slate-200 active:scale-95 transition-all">Kilidi Aç</button>
                                </form>
                                <button onClick={() => setShowPassModal(false)} className="mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Geri Dön</button>
                            </div>
                        </div>
                    )}

                    {/* Form Modals (Saha ve Lead) */}
                    {(showForm || showLeadForm) && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-lg flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white rounded-[3rem] w-full max-w-xl shadow-2xl overflow-hidden max-h-[92vh] overflow-y-auto no-scrollbar animate-fade-in border border-white/20">
                                <div className={`p-8 ${activeTab === 'saha' ? 'bg-slate-900' : 'bg-indigo-600'} text-white flex justify-between items-center sticky top-0 z-10`}>
                                    <h2 className="text-2xl font-black uppercase tracking-tighter flex items-center gap-3">
                                        {activeTab === 'saha' ? <><Icons.MapPin size={28}/> Yeni Saha Kaydı</> : <><Icons.Instagram size={28}/> Yeni Sosyal Talep</>}
                                    </h2>
                                    <button onClick={() => activeTab === 'saha' ? setShowForm(false) : setShowLeadForm(false)} className="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/20 hover:bg-white/40 transition-all"><Icons.X size={24} /></button>
                                </div>
                                <form onSubmit={activeTab === 'saha' ? addAppointment : addLead} className="p-8 md:p-10 space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">{activeTab === 'saha' ? 'Merkez / Salon Adı' : 'Müşteri Salon Adı'}</label>
                                        <input name={activeTab === 'saha' ? "centerName" : "salonName"} required className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-bold outline-none transition-all" placeholder="Örn: Ege Güzellik Salonu" />
                                    </div>
                                    {activeTab === 'sosyal' && (
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">İletişim Numarası</label>
                                            <input name="phone" type="tel" required className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-bold outline-none transition-all" placeholder="05XX XXX XX XX" />
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Şehir</label>
                                            <select name="city" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                {Object.keys(CITY_DISTRICTS).sort((a,b)=>a.localeCompare(b,'tr')).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        {activeTab === 'saha' ? (
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">İlçe</label>
                                                <select name="district" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                    {CITY_DISTRICTS["İstanbul"].map(d => <option key={d} value={d}>{d}</option>)}
                                                </select>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Satış Temsilcisi</label>
                                                <select name="salesRep" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                    {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                    {activeTab === 'saha' && (
                                        <>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Ziyaret Edecek Temsilci</label>
                                            <select name="salesRep" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                                {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Ziyaret Tarihi</label>
                                                <input name="date" type="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Saat</label>
                                                <input name="time" type="time" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                            </div>
                                        </div>
                                        </>
                                    )}
                                    <button type="submit" className={`w-full ${activeTab === 'saha' ? 'bg-slate-900' : 'bg-indigo-600'} text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl hover:shadow-2xl transition-all active:scale-[0.98] mt-4`}>
                                        Sisteme Kaydet
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Silme Onayı */}
                    {deletingRecord && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-4 z-[200] animate-fade-in">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-6"><Icons.Trash2 size={32}/></div>
                                <h3 className="text-2xl font-black mb-2 uppercase tracking-tighter text-slate-900">Emin misiniz?</h3>
                                <p className="text-slate-500 font-bold text-[11px] mb-8 leading-relaxed uppercase tracking-wider">Bu kayıt kalıcı olarak silinecektir.</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setDeletingRecord(null)} className="flex-1 font-black text-slate-400 uppercase text-[10px] tracking-widest py-4 border-2 border-slate-100 rounded-2xl">Vazgeç</button>
                                    <button onClick={deleteAnyRecord} className="flex-[2] bg-rose-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-rose-200">Evet, Sil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notification */}
                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] text-[11px] font-black uppercase tracking-widest z-[250] shadow-2xl flex items-center gap-4 animate-fade-in border border-white/10">
                            <div className="w-2.5 h-2.5 bg-indigo-400 rounded-full animate-pulse shadow-glow"></div>
                            {notification}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
