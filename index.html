<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosgen Medical | Saha & Sosyal Medya Takip</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { color: #0f172a; border-bottom: 3px solid #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- İkon Bileşenleri ---
        const Icon = ({ d, size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={d} />
            </svg>
        );

        const Icons = {
            Calendar: (p) => <Icon {...p} d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z M16 2v4 M8 2v4 M3 10h18" />,
            MapPin: (p) => <Icon {...p} d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z M12 10 a3 3 0 1 0 0-6 3 3 0 0 0 0 6" />,
            User: (p) => <Icon {...p} d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8" />,
            CheckCircle: (p) => <Icon {...p} d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01 9 11.01" />,
            Clock: (p) => <Icon {...p} d="M12 12m-10 0a10 10 0 1 0 20 0a10 10 0 1 0-20 0 M12 6v6l4 2" />,
            Plus: (p) => <Icon {...p} d="M12 5v14 M5 12h14" />,
            Search: (p) => <Icon {...p} d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.35-4.35" />,
            Trash2: (p) => <Icon {...p} d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
            Lock: (p) => <Icon {...p} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z M7 11V7a5 5 0 0 1 10 0v4" />,
            X: (p) => <Icon {...p} d="M18 6L6 18M6 6l12 12" />,
            Phone: (p) => <Icon {...p} d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
            Instagram: (p) => <Icon {...p} d="M17 2H7a5 5 0 0 0-5 5v10a5 5 0 0 0 5 5h10a5 5 0 0 0 5-5V7a5 5 0 0 0-5-5z M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z M17.5 6.5h.01" />,
            Users: (p) => <Icon {...p} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75" />
        };

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCzRjEc2aud5MFccPmgzjpeHezrhTfz1Pk",
            authDomain: "cosgenv2.firebaseapp.com",
            projectId: "cosgenv2",
            storageBucket: "cosgenv2.firebasestorage.app",
            messagingSenderId: "547874140972",
            appId: "1:547874140972:web:70019681e4f66d2a5bb289",
            measurementId: "G-QQTWEW2ZD3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const CITY_DISTRICTS = {
            "Adana": ["Seyhan", "Çukurova", "Sarıçam", "Yüreğir", "Ceyhan", "Kozan"], "Adıyaman": ["Merkez", "Kahta", "Besni"], "Afyonkarahisar": ["Merkez", "Sandıklı", "Dinar"], "Ağrı": ["Merkez", "Patnos", "Doğubayazıt"], "Amasya": ["Merkez", "Merzifon", "Suluova"], "Ankara": ["Çankaya", "Keçiören", "Yenimahalle", "Mamak", "Etimesgut", "Sincan", "Altındağ", "Gölbaşı"], "Antalya": ["Muratpaşa", "Kepez", "Konyaaltı", "Alanya", "Manavgat", "Serik", "Kumluca"], "Artvin": ["Merkez", "Hopa", "Arhavi"], "Aydın": ["Efeler", "Nazilli", "Söke", "Kuşadası", "Didim"], "Balıkesir": ["Karesi", "Altıeylül", "Bandırma", "Edremit", "Ayvalık"], "Bilecik": ["Merkez", "Bozüyük"], "Bingöl": ["Merkez", "Genç", "Solhan"], "Bitlis": ["Merkez", "Tatvan", "Ahlat"], "Bolu": ["Merkez", "Gerede"], "Burdur": ["Merkez", "Bucak"], "Bursa": ["Nilüfer", "Osmangazi", "Yıldırım", "İnegöl", "Gemlik", "Mustafakemalpaşa"], "Çanakkale": ["Merkez", "Biga", "Çan", "Gelibolu"], "Çankırı": ["Merkez", "Çerkeş"], "Çorum": ["Merkez", "Sungurlu", "Osmancık"], "Denizli": ["Pamukkale", "Merkezefendi", "Acıpayam", "Tavas"], "Diyarbakır": ["Kayapınar", "Bağlar", "Yenişehir", "Sur", "Ergani", "Bismil"], "Edirne": ["Merkez", "Keşan", "Uzunköprü"], "Elazığ": ["Merkez", "Kovancılar"], "Erzincan": ["Merkez", "Tercan"], "Erzurum": ["Yakutiye", "Palandöken", "Aziziye", "Oltu"], "Eskişehir": ["Odunpazarı", "Tepebaşı"], "Gaziantep": ["Şahinbey", "Şehitkamil", "Nizip", "İslahiye"], "Giresun": ["Merkez", "Bulancak", "Tirebolu"], "Gümüşhane": ["Merkez", "Kelkit"], "Hakkari": ["Merkez", "Yüksekova"], "Hatay": ["Antakya", "İskenderun", "Defne", "Dörtyol", "Samandağ"], "Isparta": ["Merkez", "Eğirdir", "Yalvaç"], "Mersin": ["Yenişehir", "Mezitli", "Toroslar", "Akdeniz", "Tarsus", "Silifke", "Anamur"], "İstanbul": ["Beşiktaş", "Kadıköy", "Şişli", "Üsküdar", "Fatih", "Bakırköy", "Ataşehir", "Beylikdüzü", "Sarıyer", "Başakşehir", "Esenyurt"], "İzmir": ["Konak", "Karşıyaka", "Bornova", "Buca", "Bayraklı", "Çiğli", "Gaziemir", "Menemen", "Torbalı", "Aliağa", "Çeşme"], "Kars": ["Merkez", "Sarıkamış"], "Kastamonu": ["Merkez", "Tosya", "İnebolu"], "Kayseri": ["Melikgazi", "Kocasinan", "Talas", "Develi"], "Kırklareli": ["Merkez", "Lüleburgaz", "Babaeski"], "Kırşehir": ["Merkez", "Kaman"], "Kocaeli": ["İzmit", "Gebze", "Gölcük", "Körfez", "Derince", "Kartepe"], "Konya": ["Selçuklu", "Meram", "Karatay", "Ereğli", "Akşehir", "Beyşehir"], "Kütahya": ["Merkez", "Tavşanlı", "Gediz"], "Malatya": ["Yeşilyurt", "Battalgazi", "Doğanşehir"], "Manisa": ["Yunusemre", "Şehzadeler", "Akhisar", "Turgutlu", "Salihli", "Soma"], "Kahramanmaraş": ["Onikişubat", "Dulkadiroğlu", "Elbistan", "Afşin"], "Mardin": ["Artuklu", "Kızıltepe", "Midyat", "Nusaybin"], "Muğla": ["Menteşe", "Bodrum", "Fethiye", "Marmaris", "Milas", "Dalaman"], "Muş": ["Merkez", "Bulanık"], "Nevşehir": ["Merkez", "Ürgüp", "Avanos"], "Niğde": ["Merkez", "Bor"], "Ordu": ["Altınordu", "Ünye", "Fatsa"], "Rize": ["Merkez", "Ardeşen", "Çayeli"], "Sakarya": ["Adapazarı", "Serdivan", "Erenler", "Hendek", "Akyazı"], "Samsun": ["Atakum", "İlkadım", "Canik", "Bafra", "Çarşamba"], "Siirt": ["Merkez", "Kurtalan"], "Sinop": ["Merkez", "Boyabat"], "Sivas": ["Merkez", "Şarkışla", "Yıldızeli"], "Tekirdağ": ["Süleymanpaşa", "Çorlu", "Çerkezköy", "Kapaklı"], "Tokat": ["Merkez", "Erbaa", "Turhal", "Niksar"], "Trabzon": ["Ortahisar", "Akçaabat", "Araklı", "Of"], "Tunceli": ["Merkez"], "Şanlıurfa": ["Haliliye", "Eyyübiye", "Karaköprü", "Siverek", "Viranşehir", "Suruç"], "Uşak": ["Merkez", "Banaz"], "Van": ["İpekyolu", "Tuşba", "Edremit", "Erciş"], "Yozgat": ["Merkez", "Sorgun"], "Zonguldak": ["Merkez", "Ereğli", "Çaycuma"], "Aksaray": ["Merkez"], "Bayburt": ["Merkez"], "Karaman": ["Merkez"], "Kırıkkale": ["Merkez", "Yahşihan"], "Batman": ["Merkez", "Kozluk"], "Şırnak": ["Merkez", "Cizre", "Silopi"], "Bartın": ["Merkez"], "Ardahan": ["Merkez"], "Iğdır": ["Merkez"], "Yalova": ["Merkez", "Çınarcık"], "Karabük": ["Merkez", "Safranbolu"], "Kilis": ["Merkez"], "Osmaniye": ["Merkez", "Kadirli"], "Düzce": ["Merkez", "Akçakoca"]
        };

        const App = () => {
            const ADMIN_PASSWORD = "cosgen45"; 
            const salesReps = ['Işıl Engin', 'Hasret Gökot', 'Handan Sevgi', 'Ömür Kaplan', 'Gamze Kaç'];

            const [appointments, setAppointments] = useState([]);
            const [leads, setLeads] = useState([]);
            const [activeTab, setActiveTab] = useState('saha'); // 'saha' or 'sosyal'
            const [loading, setLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [filterCity, setFilterCity] = useState('Hepsi');
            const [searchQuery, setSearchQuery] = useState('');
            const [notification, setNotification] = useState(null);
            const [deletingRecord, setDeletingRecord] = useState(null);

            // Saha Kayıt Form State
            const [newApp, setNewApp] = useState({ centerName: '', city: 'İstanbul', district: 'Beşiktaş', date: '', time: '', salesRep: salesReps[0] });
            
            // Sosyal Medya Lead Form State
            const [newLead, setNewLead] = useState({ salonName: '', phone: '', city: 'İstanbul', salesRep: salesReps[0] });

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("Giriş hatası:", err));

                // Sahaları Dinle
                const unsubSaha = db.collection('appointments').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'saha' }));
                    data.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
                    setAppointments(data);
                    setLoading(false);
                });

                // Talepleri Dinle
                const unsubLeads = db.collection('leads').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'lead' }));
                    setLeads(data);
                });

                return () => { unsubSaha(); unsubLeads(); };
            }, []);

            const showNotify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passInput === ADMIN_PASSWORD) { setIsAdmin(true); setShowPassModal(false); setPassInput(''); showNotify("Yönetici girişi başarılı."); }
                else showNotify("Hatalı şifre!");
            };

            const addAppointment = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('appointments').add({ ...newApp, status: 'Beklemede', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowForm(false);
                    setNewApp({ centerName: '', city: 'İstanbul', district: 'Beşiktaş', date: '', time: '', salesRep: salesReps[0] });
                    showNotify("Ziyaret kaydedildi.");
                } catch (e) { showNotify("Hata!"); }
            };

            const addLead = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('leads').add({ ...newLead, status: 'Aranacak', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowLeadForm(false);
                    setNewLead({ salonName: '', phone: '', city: 'İstanbul', salesRep: salesReps[0] });
                    showNotify("Yeni talep oluşturuldu.");
                } catch (e) { showNotify("Kayıt hatası!"); }
            };

            const deleteAnyRecord = async () => {
                const collectionName = deletingRecord.type === 'saha' ? 'appointments' : 'leads';
                try { 
                    await db.collection(collectionName).doc(deletingRecord.id).delete(); 
                    setDeletingRecord(null); 
                    showNotify("Silindi."); 
                } catch (e) { showNotify("Hata!"); }
            };

            const updateStatus = async (id, status, type) => {
                const collectionName = type === 'saha' ? 'appointments' : 'leads';
                try { 
                    await db.collection(collectionName).doc(id).update({ status }); 
                    showNotify(`Durum: ${status}`); 
                } catch (e) { showNotify("Hata!"); }
            };

            const filteredSaha = appointments.filter(a => {
                const matchesCity = filterCity === 'Hepsi' || a.city === filterCity;
                const matchesSearch = (a.centerName || "").toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCity && matchesSearch;
            });

            const filteredLeads = leads.filter(l => {
                const matchesCity = filterCity === 'Hepsi' || l.city === filterCity;
                const matchesSearch = (l.salonName || "").toLowerCase().includes(searchQuery.toLowerCase()) || (l.salesRep || "").toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCity && matchesSearch;
            });

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-slate-300 uppercase tracking-widest text-xs">Cosgen Yükleniyor...</div>;

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto selection:bg-slate-200">
                    {/* Header */}
                    <nav className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <div className="font-black text-2xl tracking-tighter">cos<span className="text-slate-400">gen</span></div>
                        <div className="flex gap-2">
                            <button onClick={() => isAdmin ? (activeTab === 'saha' ? setShowForm(true) : setShowLeadForm(true)) : setShowPassModal(true)} 
                                    className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all shadow-lg">
                                {isAdmin ? `+ ${activeTab === 'saha' ? 'Yeni Saha' : 'Yeni Talep'}` : "Yönetici"}
                            </button>
                        </div>
                    </nav>

                    {/* Tabs */}
                    <div className="flex border-b border-slate-200 mb-8 gap-8 px-4">
                        <button onClick={() => setActiveTab('saha')} className={`pb-4 font-black uppercase text-xs tracking-widest transition-all ${activeTab === 'saha' ? 'tab-active' : 'text-slate-400 hover:text-slate-600'}`}>
                            Saha Ziyaretleri ({appointments.length})
                        </button>
                        <button onClick={() => setActiveTab('sosyal')} className={`pb-4 font-black uppercase text-xs tracking-widest transition-all ${activeTab === 'sosyal' ? 'tab-active' : 'text-slate-400 hover:text-slate-600'}`}>
                            Sosyal Medya Talepleri ({leads.length})
                        </button>
                    </div>

                    {/* Search & Global City Filter */}
                    <div className="flex flex-col md:flex-row gap-4 mb-8">
                        <div className="relative flex-1">
                            <Icons.Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                            <input type="text" placeholder={activeTab === 'saha' ? "Merkez ara..." : "Salon veya satışçı ara..."} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl font-bold outline-none" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <select className="p-4 bg-white border border-slate-100 rounded-2xl font-black text-xs uppercase cursor-pointer" value={filterCity} onChange={e => setFilterCity(e.target.value)}>
                            <option value="Hepsi">Tüm Şehirler</option>
                            {Object.keys(CITY_DISTRICTS).sort((a,b)=>a.localeCompare(b,'tr')).map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>

                    {/* Saha Listesi */}
                    {activeTab === 'saha' && (
                        <div className="space-y-4">
                            {filteredSaha.map(app => (
                                <div key={app.id} className="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-50 shadow-sm hover:shadow-md transition-all flex flex-col lg:flex-row justify-between lg:items-center gap-6 animate-fade-in">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border ${app.status === 'Beklemede' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{app.status}</span>
                                            {isAdmin && <button onClick={() => setDeletingRecord(app)} className="text-slate-200 hover:text-rose-500 transition-colors"><Icons.Trash2 size={16}/></button>}
                                        </div>
                                        <h4 className="text-2xl font-black text-slate-900 uppercase tracking-tight">{app.centerName}</h4>
                                        <div className="text-slate-400 font-bold text-[11px] uppercase tracking-wide">{app.district} / {app.city}</div>
                                    </div>
                                    <div className="flex flex-wrap gap-8 items-center lg:border-l lg:pl-10 lg:border-slate-50">
                                        <div><p className="text-[9px] font-black text-slate-300 uppercase mb-1">Vakit</p><div className="text-slate-700 font-bold text-sm">{app.date} | {app.time}</div></div>
                                        <div><p className="text-[9px] font-black text-slate-300 uppercase mb-1">Temsilci</p><div className="text-slate-700 font-bold text-sm">{app.salesRep}</div></div>
                                        <div>
                                            {app.status === 'Beklemede' ? 
                                                <button onClick={() => updateStatus(app.id, 'Tamamlandı', 'saha')} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Tamamla</button> : 
                                                <div className="text-emerald-600 font-black text-[10px] uppercase tracking-widest flex items-center gap-2"><Icons.CheckCircle size={18}/> Bitti</div>
                                            }
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Sosyal Medya Listesi */}
                    {activeTab === 'sosyal' && (
                        <div className="space-y-4">
                            {filteredLeads.map(lead => (
                                <div key={lead.id} className="bg-white p-6 md:p-8 rounded-[2.5rem] border-2 border-indigo-50 shadow-sm hover:shadow-md transition-all flex flex-col lg:flex-row justify-between lg:items-center gap-6 animate-fade-in">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border ${lead.status === 'Aranacak' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{lead.status}</span>
                                            <div className="p-1 bg-gradient-to-r from-purple-500 to-pink-500 rounded text-white"><Icons.Instagram size={10}/></div>
                                            {isAdmin && <button onClick={() => setDeletingRecord(lead)} className="text-slate-200 hover:text-rose-500 transition-colors ml-2"><Icons.Trash2 size={16}/></button>}
                                        </div>
                                        <h4 className="text-2xl font-black text-slate-900 uppercase tracking-tight">{lead.salonName}</h4>
                                        <div className="flex items-center gap-4 mt-2">
                                            <div className="text-slate-400 font-bold text-[11px] uppercase tracking-wide flex items-center gap-1"><Icons.MapPin size={12}/> {lead.city}</div>
                                            <a href={`tel:${lead.phone}`} className="text-indigo-600 font-black text-[11px] uppercase tracking-wide flex items-center gap-1 hover:underline"><Icons.Phone size={12}/> {lead.phone}</a>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-8 items-center lg:border-l lg:pl-10 lg:border-slate-50">
                                        <div className="min-w-[120px]">
                                            <p className="text-[9px] font-black text-slate-300 uppercase mb-1 tracking-widest">Sorumlu Satışçı</p>
                                            <div className="text-indigo-600 font-bold text-sm flex items-center gap-2 underline decoration-indigo-200 underline-offset-4">{lead.salesRep}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            {lead.status === 'Aranacak' ? (
                                                <>
                                                    <a href={`tel:${lead.phone}`} className="bg-emerald-500 text-white p-3 rounded-xl shadow-lg hover:bg-emerald-600 transition-all"><Icons.Phone size={18}/></a>
                                                    <button onClick={() => updateStatus(lead.id, 'Arandı', 'lead')} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Arandı Yap</button>
                                                </>
                                            ) : (
                                                <div className="text-slate-400 font-black text-[10px] uppercase tracking-widest flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl"><Icons.CheckCircle size={18}/> Görüşüldü</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Modals */}
                    {showPassModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <Icons.Lock size={40} className="mx-auto mb-6 text-slate-900" />
                                <h3 className="text-2xl font-black mb-6 uppercase tracking-tighter">Yönetici Girişi</h3>
                                <form onSubmit={handlePasswordSubmit}>
                                    <input type="password" autoFocus className="w-full p-5 bg-slate-50 rounded-[1.5rem] mb-6 text-center font-black text-2xl outline-none" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="••••" />
                                    <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Giriş</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Saha Kayıt Formu */}
                    {showForm && (activeTab === 'saha') && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[3rem] w-full max-w-xl shadow-2xl overflow-hidden max-h-[95vh] overflow-y-auto no-scrollbar">
                                <div className="p-8 bg-slate-50 border-b flex justify-between items-center sticky top-0 z-10">
                                    <h2 className="text-2xl font-black uppercase tracking-tighter flex items-center gap-2"><Icons.MapPin size={24}/> Saha Ziyareti</h2>
                                    <button onClick={() => setShowForm(false)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white border text-slate-400 hover:text-slate-900"><Icons.X size={20} /></button>
                                </div>
                                <form onSubmit={addAppointment} className="p-10 space-y-6">
                                    <input required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" placeholder="Salon/Merkez Adı" value={newApp.centerName} onChange={e => setNewApp({...newApp, centerName: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-6">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newApp.city} onChange={e => setNewApp({...newApp, city: e.target.value, district: CITY_DISTRICTS[e.target.value][0]})}>
                                            {Object.keys(CITY_DISTRICTS).sort((a,b)=>a.localeCompare(b,'tr')).map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newApp.district} onChange={e => setNewApp({...newApp, district: e.target.value})}>
                                            {(CITY_DISTRICTS[newApp.city] || []).map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newApp.salesRep} onChange={e => setNewApp({...newApp, salesRep: e.target.value})}>
                                        {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-6">
                                        <input type="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newApp.date} onChange={e => setNewApp({...newApp, date: e.target.value})} />
                                        <input type="time" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newApp.time} onChange={e => setNewApp({...newApp, time: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl">Saha Kaydını Tamamla</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Sosyal Medya Lead Formu */}
                    {showLeadForm && (activeTab === 'sosyal') && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[3rem] w-full max-w-xl shadow-2xl overflow-hidden max-h-[95vh] overflow-y-auto no-scrollbar animate-fade-in">
                                <div className="p-8 bg-gradient-to-r from-purple-500 to-pink-500 text-white flex justify-between items-center sticky top-0 z-10">
                                    <h2 className="text-2xl font-black uppercase tracking-tighter flex items-center gap-2"><Icons.Instagram size={24}/> Yeni Talep</h2>
                                    <button onClick={() => setShowLeadForm(false)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/40"><Icons.X size={20} /></button>
                                </div>
                                <form onSubmit={addLead} className="p-10 space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Salon Adı</label>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" placeholder="Güzellik Salonu İsmi" value={newLead.salonName} onChange={e => setNewLead({...newLead, salonName: e.target.value})} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Telefon Numarası</label>
                                        <input required type="tel" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" placeholder="05XX XXX XX XX" value={newLead.phone} onChange={e => setNewLead({...newLead, phone: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Ulaştığı Bölge/Şehir</label>
                                            <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newLead.city} onChange={e => setNewLead({...newLead, city: e.target.value})}>
                                                {Object.keys(CITY_DISTRICTS).sort((a,b)=>a.localeCompare(b,'tr')).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Yönlendirilecek Satışçı</label>
                                            <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={newLead.salesRep} onChange={e => setNewLead({...newLead, salesRep: e.target.value})}>
                                                {salesReps.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl">Talebi Listeye Ekle</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {deletingRecord && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-[70]">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-2xl font-black mb-8 uppercase tracking-tighter">Silinsin mi?</h3>
                                <div className="flex gap-4">
                                    <button onClick={() => setDeletingRecord(null)} className="flex-1 font-black text-slate-400 uppercase text-[10px] tracking-widest">Hayır</button>
                                    <button onClick={deleteAnyRecord} className="flex-[2] bg-rose-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Evet, Sil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full text-[11px] font-black uppercase tracking-widest z-[100] shadow-2xl flex items-center gap-3 animate-fade-in">
                            <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                            {notification}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
